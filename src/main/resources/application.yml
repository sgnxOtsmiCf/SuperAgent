super-agent:
  author: sgnxotsmicf
  version: 0.10
  description: 多智能体平台服务项目

spring:
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  application:
    name: SuperAgent
  ai:
    mcp:
      client:
        stdio:
          servers-configuration: classpath:mcp-servers.json

server:
  port: 8123
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-response: true

# springdoc-openapi
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: cn.sgnxotsmicf
knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    org.springframework.ai.deepseek: debug
    org.springframework.ai: debug

# mp
mybatis-plus:
  configuration:
    # MyBatis 配置
    map-underscore-to-camel-case: true
    auto-mapping-behavior: full
  global-config:
    # 全局配置
    db-config:
      # 数据库配置
      id-type: auto
      logic-delete-field: deleted # 全局逻辑删除字段名(deleted为实体类属性名称)
      logic-delete-value: 1 # 逻辑已删除值。可选，默认值为 1
      logic-not-delete-value: 0 # 逻辑未删除值。可选，默认值为 0
    banner: false
  mapper-locations: classpath*:/mapper/**/*.xml

ai:
  upload:
    max-size: 10485760  # 10MB
    allow-types: image/png,image/jpeg,image/jpg,image/webp,audio/mp3,audio/wav,video/mp4
